<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岡山 Travel Loop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF6EC;
    --ink:#33473A;
    --ink-soft:#7C8570;
    --sea:#5B9BB0;
    --sea-light:#EAF4F6;
    --coral:#E8935F;
    --coral-light:#FDEDE1;
    --clay:#C9A227;
    --clay-light:#FAF0DC;
    --line:#EBE1C9;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:900px;margin:0 auto;padding:28px 20px 60px;
  }
  .cover-banner{
    width:100%;border-radius:14px;display:block;
    box-shadow:0 8px 24px rgba(51,71,58,.18);
    margin-bottom:6px;
  }
  .cover-caption{
    text-align:center;font-family:"Shippori Mincho",serif;
    color:var(--ink);font-size:14px;letter-spacing:2px;
    margin:14px 0 22px;
  }
  .cover-caption span{color:var(--coral);}
  .hero{
    background:var(--card);
    border-radius:14px;
    padding:22px 26px;
    color:var(--ink);
    position:relative;
    overflow:hidden;
    border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(51,71,58,.06);
  }
  .compass{display:none;}
  .hero h1{
    font-family:"Shippori Mincho",serif;
    font-weight:700;
    font-size:32px;
    margin:0 0 6px;
    letter-spacing:1px;
  }
  .hero .sub{font-size:14px;opacity:.8;margin:0 0 18px;}
  .hero-stats{display:flex;gap:24px;flex-wrap:wrap;align-items:baseline;}
  .hero-stats .num{font-family:"Shippori Mincho",serif;font-size:40px;font-weight:700;color:var(--coral);}
  .hero-stats .lbl{font-size:12px;opacity:.75;display:block;margin-top:2px;}
  .sw-banner{
    margin-top:18px;
    background:var(--coral-light);
    border:1px solid #F0C9A8;
    border-radius:8px;
    padding:10px 14px;
    font-size:13px;
    line-height:1.6;
    color:var(--ink);
  }

  .tideline{
    margin:26px 0 8px;
    display:flex;
    justify-content:space-between;
    position:relative;
    padding:0 4px;
  }
  .tideline::before{
    content:"";
    position:absolute;
    top:17px;left:20px;right:20px;height:2px;
    background:var(--line);
  }
  .tide-node{
    position:relative;
    display:flex;flex-direction:column;align-items:center;
    width:11%;
    cursor:pointer;
    background:none;border:none;font-family:inherit;
  }
  .tide-dot{
    width:34px;height:34px;border-radius:50%;
    background:var(--card);
    border:2px solid var(--sea);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:var(--sea);
    z-index:1;
    transition:transform .15s ease;
  }
  .tide-node.sw .tide-dot{border-color:var(--coral);color:var(--coral);}
  .tide-node.today .tide-dot{background:var(--sea);color:#fff;transform:scale(1.15);}
  .tide-node.today.sw .tide-dot{background:var(--coral);}
  .tide-node:hover .tide-dot{transform:scale(1.1);}
  .tide-date{font-size:10px;color:var(--ink-soft);margin-top:6px;text-align:center;}

  .tabs{
    display:flex;gap:6px;margin:28px 0 18px;
    border-bottom:1px solid var(--line);
    flex-wrap:wrap;
  }
  .tab-btn{
    background:none;border:none;
    font-family:"Noto Sans TC",sans-serif;
    font-size:14px;font-weight:500;
    color:var(--ink-soft);
    padding:10px 14px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
  }
  .tab-btn.active{color:var(--sea);border-bottom-color:var(--sea);font-weight:700;}
  .panel{display:none;}
  .panel.active{display:block;}

  .day-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    margin-bottom:12px;
    overflow:hidden;
  }
  .day-head{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;
    cursor:pointer;
  }
  .day-badge{
    font-family:"Shippori Mincho",serif;
    font-weight:700;font-size:13px;
    background:var(--sea-light);color:var(--sea);
    border-radius:6px;padding:4px 8px;min-width:52px;text-align:center;
  }
  .day-card.sw .day-badge{background:var(--coral-light);color:var(--coral);}
  .day-title{font-weight:700;font-size:15px;flex:1;}
  .day-date{font-size:12px;color:var(--ink-soft);}
  .day-chevron{transition:transform .2s ease;color:var(--ink-soft);}
  .day-card.open .day-chevron{transform:rotate(180deg);}
  .day-body{display:none;padding:0 16px 16px;}
  .day-card.open .day-body{display:block;}

  .station-box{
    background:var(--clay-light);border-radius:8px;
    padding:10px 12px;margin:10px 0 12px;font-size:12px;color:var(--ink);line-height:1.6;
  }
  .station-box b{color:var(--clay);}

  .tl-row{
    display:grid;grid-template-columns:52px 1fr;
    gap:10px;padding:8px 0;
    border-top:1px solid var(--line);
    font-size:13px;
  }
  .tl-row:first-child{border-top:none;}
  .tl-time{color:var(--clay);font-weight:700;}
  .tl-content{color:var(--ink);}
  .tl-note{color:var(--ink-soft);font-size:12px;margin-top:2px;}
  .tl-transport{display:inline-block;background:var(--clay-light);color:var(--clay);font-size:11px;padding:1px 7px;border-radius:5px;margin-top:3px;}
  .tl-maps{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--sea);margin-top:4px;text-decoration:none;}
  .tl-maps:hover{text-decoration:underline;}

  .meals-title{font-size:12px;color:var(--clay);font-weight:700;margin:12px 0 6px;}
  .meal-row{
    display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--line);font-size:13px;align-items:flex-start;
  }
  .meal-row:first-child{border-top:none;}
  .meal-tag{
    background:var(--sea-light);color:var(--sea);font-size:11px;font-weight:700;
    padding:2px 8px;border-radius:5px;min-width:40px;text-align:center;flex-shrink:0;
  }
  .meal-name{font-weight:500;}
  .meal-note{color:var(--ink-soft);font-size:12px;margin-top:2px;}

  .journal-card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px;margin-bottom:12px;
  }
  .journal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .journal-head .jt{font-weight:700;font-size:14px;}
  .stars{display:flex;gap:4px;}
  .star{cursor:pointer;font-size:18px;color:var(--line);background:none;border:none;padding:0;}
  .star.on{color:var(--coral);}
  .journal-row{display:flex;gap:10px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
  .journal-row label{font-size:12px;color:var(--ink-soft);min-width:60px;}
  input[type="number"], textarea{
    font-family:"Noto Sans TC",sans-serif;
    border:1px solid var(--line);border-radius:8px;
    padding:7px 10px;font-size:13px;color:var(--ink);
    background:#FDFCF9;
  }
  input[type="number"]{width:120px;}
  textarea{width:100%;min-height:56px;resize:vertical;}
  .save-btn{
    background:var(--sea);color:#fff;border:none;border-radius:8px;
    padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;
    font-family:"Noto Sans TC",sans-serif;
  }
  .save-btn:active{transform:scale(.97);}
  .save-msg{font-size:11px;color:var(--sea);margin-left:8px;}

  .checklist-group{margin-bottom:20px;}
  .checklist-group h3{
    font-size:14px;color:var(--clay);margin:0 0 8px;
    font-family:"Shippori Mincho",serif;
  }
  .check-item{
    display:flex;align-items:center;gap:10px;
    padding:8px 0;border-top:1px solid var(--line);font-size:13px;
  }
  .check-item:first-child{border-top:none;}
  .check-item input{width:16px;height:16px;accent-color:var(--sea);}
  .check-item.checked span{text-decoration:line-through;color:var(--ink-soft);}

  .ticket-card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px;margin-bottom:12px;
  }
  .ticket-card .tname{font-weight:700;font-size:14px;margin-bottom:4px;}
  .ticket-card .tdesc{font-size:12px;color:var(--ink-soft);margin-bottom:8px;line-height:1.6;}
  .ticket-days{display:flex;gap:6px;flex-wrap:wrap;}
  .ticket-days span{
    background:var(--sea-light);color:var(--sea);
    font-size:11px;padding:3px 9px;border-radius:12px;font-weight:500;
  }

  table.backup{width:100%;border-collapse:collapse;font-size:13px;}
  table.backup th{
    text-align:left;background:var(--ink);color:#fff;
    padding:8px 10px;font-weight:500;font-size:12px;
  }
  table.backup td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
  table.backup tr:nth-child(even){background:#FCFAF5;}

  .footer-note{
    margin-top:30px;text-align:center;font-size:12px;color:var(--ink-soft);
  }
</style>
</head>

// Storage adapter: uses Claude artifact's window.storage when available,
// falls back to browser localStorage when running standalone (e.g. GitHub Pages).
const storageAdapter = {
  async get(key){
    if(window.storage){
      try{ return await window.storage.get(key); }catch(e){ return null; }
    }
    try{
      const v = localStorage.getItem(key);
      return v !== null ? {key, value:v} : null;
    }catch(e){ return null; }
  },
  async set(key, value){
    if(window.storage){
      try{ return await window.storage.set(key, value); }catch(e){ return null; }
    }
    try{
      localStorage.setItem(key, value);
      return {key, value};
    }catch(e){ return null; }
  }
};

function daysUntil(dateStr){
  const target = new Date(dateStr);
  const now = new Date();
  const diff = Math.ceil((target - now) / (1000*60*60*24));
  return diff;
}

function initCountdown(){
  const d = daysUntil("2026-09-18T12:40:00+09:00");
  const el = document.getElementById("countdown");
  const lbl = document.getElementById("countdown-lbl");
  if(d > 0){ el.textContent = d; lbl.textContent = "距離出發還有幾天"; }
  else if(d === 0){ el.textContent = "出發"; lbl.textContent = "今天就是Day1"; }
  else {
    const back = daysUntil("2026-09-25T20:15:00+09:00");
    if(back >= 0){ el.textContent = "旅程中"; lbl.textContent = "祝旅途愉快"; }
    else { el.textContent = "已完成"; lbl.textContent = "旅程回顧"; }
  }
}

function currentDayIndex(){
  const now = new Date();
  const start = new Date("2026-09-18T00:00:00+09:00");
  const diff = Math.floor((now - start) / (1000*60*60*24));
  if(diff >= 0 && diff < 8) return diff + 1;
  return -1;
}

function renderTideline(){
  const wrap = document.getElementById("tideline");

    const btn = document.createElement("button");

    btn.innerHTML = `<span class="tide-dot">${d.n}</span><span class="tide-date">${d.date}</span>`;
    btn.onclick = ()=>{ switchTab("itinerary"); openDay(d.n); };
    wrap.appendChild(btn);
  });
}

function renderChecklist(){
  const wrap = document.getElementById("panel-checklist");
  Object.entries(CHECKLIST).forEach(([group, items])=>{
    const g = document.createElement("div");
    g.className = "checklist-group";
    g.innerHTML = `<h3>${group}</h3>` + items.map(([id,label])=>`
      <div class="check-item" id="item-${id}">
        <input type="checkbox" id="cb-${id}" onchange="onCheck('${id}')">
        <span>${label}</span>
      </div>`).join("");
    wrap.appendChild(g);
  });
  loadChecklist();
}

async function onCheck(id){
  const cb = document.getElementById("cb-"+id);
  const row = document.getElementById("item-"+id);
  row.classList.toggle("checked", cb.checked);
  await storageAdapter.set("checklist:"+id, JSON.stringify({checked: cb.checked}));
}

async function loadChecklist(){
  const allIds = Object.values(CHECKLIST).flat().map(x=>x[0]);
  for(const id of allIds){
    const res = await storageAdapter.get("checklist:"+id);
    if(res && res.value){
      try{
        const val = JSON.parse(res.value);
        if(val.checked){
          document.getElementById("cb-"+id).checked = true;
          document.getElementById("item-"+id).classList.add("checked");
        }
      }catch(e){}
    }
  }
}

        </div>
      </div>
      <div class="journal-row">
        <label>花費(台幣)</label>
        <input type="number" id="exp-${d.n}" placeholder="0" min="0">
      </div>
      <div class="journal-row" style="align-items:flex-start">
        <label>心得</label>
        <textarea id="note-${d.n}" placeholder="今天最喜歡的瞬間、想記錄的小事..."></textarea>
      </div>
      <button class="save-btn" onclick="saveJournal(${d.n})">儲存</button>
      <span class="save-msg" id="save-msg-${d.n}"></span>
    `;
    wrap.appendChild(el);
  });
  loadJournal();
}

let starVals = {};
function setStar(day, v){
  starVals[day] = v;
  document.querySelectorAll(`#stars-${day} .star`).forEach(s=>{
    s.classList.toggle("on", parseInt(s.dataset.v) <= v);
  });
}

async function saveJournal(day){
  const expense = document.getElementById("exp-"+day).value || "0";
  const note = document.getElementById("note-"+day).value || "";
  const rating = starVals[day] || 0;
  const data = { rating, expense, note, savedAt: new Date().toISOString() };
  const res = await storageAdapter.set("journal:day"+day, JSON.stringify(data));
  const msg = document.getElementById("save-msg-"+day);
  if(res){ msg.textContent = "已儲存 ✓"; setTimeout(()=>msg.textContent="",2000); }
  else { msg.textContent = "儲存失敗，請重試"; }
}

async function loadJournal(){
  for(const d of DAYS){
    const res = await storageAdapter.get("journal:day"+d.n);
    if(res && res.value){
      try{
        const data = JSON.parse(res.value);
        if(data.rating) setStar(d.n, data.rating);
        if(data.expense) document.getElementById("exp-"+d.n).value = data.expense;
        if(data.note) document.getElementById("note-"+d.n).value = data.note;
      }catch(e){}
    }
  }
}

function switchTab(name){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.panel===name));
  document.querySelectorAll(".panel").forEach(p=>p.classList.toggle("active", p.id === "panel-"+name));
}

document.querySelectorAll(".tab-btn").forEach(b=>{
  b.addEventListener("click", ()=>switchTab(b.dataset.panel));
});

renderJournal();
